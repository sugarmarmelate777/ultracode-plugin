name: "IssueOps (Agent Orchestration via Issue)"

on:
  issue_comment:
    types: [created]

jobs:
  parse-command:
    runs-on: ubuntu-latest
    if: startsWith(github.event.comment.body, '/agent-run')
    permissions:
      issues: write
      contents: write
      
    steps:
      - name: Acknowledge Command
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🤖 Принято в работу! Запускаю агента для выполнения задачи: `" + context.payload.comment.body + "`"
            })
            
      - name: Trigger Agent Workflow
        run: |
          echo "Здесь ИИ может добавить вызов webhook'а к локальному серверу Ultracode или запуск внешнего агента Sweep AI"
          # curl -X POST ...
